services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  auth-service:
    build: ./services/auth
    ports:
      - "8005:8005"
    environment:
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB: auth_db
      JWT_SECRET: change-this-secret-in-production
      PORT: "8005"
    depends_on:
      - mongo

  gateway:
    build: ./gateway
    ports:
      - "8000:8000"
    environment:
      BUSINESS_SERVICE_URL: http://business-service:8001
      BOOKING_SERVICE_URL: http://booking-service:8002
      PAYMENT_SERVICE_URL: http://payment-service:8003
      ANALYTICS_SERVICE_URL: http://analytics-service:8004
      AUTH_SERVICE_URL: http://auth-service:8005
    depends_on:
      - business-service
      - booking-service
      - payment-service
      - analytics-service
      - auth-service

  business-service:
    build: ./services/business
    ports:
      - "8001:8001"
    environment:
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB: business_db
      REDIS_URL: redis://redis:6379
      PORT: "8001"
    depends_on:
      - mongo
      - redis

  booking-service:
    build: ./services/booking
    ports:
      - "8002:8002"
    environment:
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB: booking_db
      REDIS_URL: redis://redis:6379
      BUSINESS_SERVICE_URL: http://business-service:8001
      PAYMENT_SERVICE_URL: http://payment-service:8003
      PORT: "8002"
    depends_on:
      - mongo
      - redis

  payment-service:
    build: ./services/payment
    ports:
      - "8003:8003"
    environment:
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB: payment_db
      REDIS_URL: redis://redis:6379
      PORT: "8003"
    depends_on:
      - mongo
      - redis

  analytics-service:
    build: ./services/analytics
    ports:
      - "8004:8004"
    environment:
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB: analytics_db
      REDIS_URL: redis://redis:6379
      BUSINESS_SERVICE_URL: http://business-service:8001
      PORT: "8004"
    depends_on:
      - mongo
      - redis
      - business-service

  notification-service:
    build: ./services/notification
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      API_URL: http://gateway:8000
    depends_on:
      - gateway

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - gateway
      - auth-service
      - business-service
      - booking-service
      - payment-service
      - analytics-service

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  mongo_data:
  grafana_data:
