apiVersion: apps/v1
kind: Deployment
metadata:
  name: business-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: business-service
  template:
    metadata:
      labels:
        app: business-service
    spec:
      containers:
        - name: business-service
          image: davidlondo/the-booking-project:business
          imagePullPolicy: IfNotPresent
          env:
            - name: MONGO_URL
              value: mongodb://mongo:27017
            - name: MONGO_DB
              value: business_db
            - name: REDIS_URL
              value: redis://redis:6379
            - name: PORT
              value: "8001"
          ports:
            - containerPort: 8001
          readinessProbe:
            tcpSocket:
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: business-service
spec:
  selector:
    app: business-service
  ports:
    - name: http
      port: 8001
      targetPort: 8001
