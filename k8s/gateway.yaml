apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: davidlondo/the-booking-project:gateway
          imagePullPolicy: IfNotPresent
          env:
            - name: BUSINESS_SERVICE_URL
              value: http://business-service:8001
            - name: BOOKING_SERVICE_URL
              value: http://booking-service:8002
            - name: PAYMENT_SERVICE_URL
              value: http://payment-service:8003
            - name: ANALYTICS_SERVICE_URL
              value: http://analytics-service:8004
            - name: AUTH_SERVICE_URL
              value: http://auth-service:8005
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
spec:
  type: NodePort
  selector:
    app: gateway
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 30081
