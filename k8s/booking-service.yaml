apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: booking-service
  template:
    metadata:
      labels:
        app: booking-service
    spec:
      containers:
        - name: booking-service
          image: davidlondo/the-booking-project:booking
          imagePullPolicy: IfNotPresent
          env:
            - name: MONGO_URL
              value: mongodb://mongo:27017
            - name: MONGO_DB
              value: booking_db
            - name: REDIS_URL
              value: redis://redis:6379
            - name: BUSINESS_SERVICE_URL
              value: http://business-service:8001
            - name: PAYMENT_SERVICE_URL
              value: http://payment-service:8003
            - name: PORT
              value: "8002"
          ports:
            - containerPort: 8002
          readinessProbe:
            tcpSocket:
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: booking-service
spec:
  selector:
    app: booking-service
  ports:
    - name: http
      port: 8002
      targetPort: 8002
