apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      containers:
        - name: analytics-service
          image: davidlondo/the-booking-project:analytics
          imagePullPolicy: IfNotPresent
          env:
            - name: MONGO_URL
              value: mongodb://mongo:27017
            - name: MONGO_DB
              value: analytics_db
            - name: REDIS_URL
              value: redis://redis:6379
            - name: BUSINESS_SERVICE_URL
              value: http://business-service:8001
            - name: PORT
              value: "8004"
          ports:
            - containerPort: 8004
          readinessProbe:
            tcpSocket:
              port: 8004
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8004
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
spec:
  selector:
    app: analytics-service
  ports:
    - name: http
      port: 8004
      targetPort: 8004
